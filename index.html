<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTCE Laboratory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-warm: #f5f2ed;
        --text-ink: #1a1a1a;
        --accent-gray: #e5e5e1;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-warm);
        color: var(--text-ink);
        -webkit-font-smoothing: antialiased;
      }
      .font-display {
        font-family: 'Abril Fatface', serif;
      }
      .font-accent {
        font-family: 'Space Grotesk', sans-serif;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-warm); 
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d1cf; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b1b1af; 
      }
      
      .editorial-grid {
        background-image: radial-gradient(#d1d1cf 0.5px, transparent 0.5px);
        background-size: 24px 24px;
      }

      .text-balance {
        text-wrap: balance;
      }
    </style>

  }
}
</script>
